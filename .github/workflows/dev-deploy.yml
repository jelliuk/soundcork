name: Development Build

# Manually triggered only — never runs automatically.
# Builds and publishes a dev-prefixed image from the dev branch,
# then runs a Trivy scan against it before it can be promoted to main.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm you want to build and push a dev image'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ── Guard ──────────────────────────────────────────────────────────────────
  confirm:
    name: Confirm deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        if: inputs.confirm != 'deploy'
        run: |
          echo "Confirmation input was '${{ inputs.confirm }}', expected 'deploy'."
          echo "Re-run the workflow and type 'deploy' in the confirmation field."
          exit 1

  # ── Stage 1 ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: confirm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev

      - name: Ruff check
        uses: astral-sh/ruff-action@v3
        with:
          args: check

      - name: Ruff format
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check

  # ── Stage 2 ────────────────────────────────────────────────────────────────
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=soundcork \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  typecheck:
    name: Type check
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install mypy

      - name: Run mypy
        run: mypy soundcork/

  # ── Stage 3 ────────────────────────────────────────────────────────────────
  # Builds and pushes the dev image only after stages 1 and 2 pass.
  # Tags follow the same date-version schema as production but are
  # prefixed with "dev-" to clearly distinguish them in the registry.

  publish:
    name: Build and publish dev image
    needs: [test, typecheck]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.build-and-push.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute dev date-version tag
        id: datever
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BUILD_NUM=${{ github.run_number }}
          echo "tag=dev-${DATE}-${BUILD_NUM}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.datever.outputs.tag }}
            type=raw,value=dev
            type=sha,prefix=dev-

      - name: Build and push dev image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the dev image
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "$TAGS" | tr ',' '\n' | xargs -I {} \
            cosign sign --yes {}@${DIGEST}

  # ── Stage 4 ────────────────────────────────────────────────────────────────
  # Trivy scan using the same approach as security.yml — table scan drives
  # the gate, SARIF is generated separately for the Security tab.
  # Scanning by digest guarantees the exact image just built is scanned.

  scan:
    name: Trivy scan dev image
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dev

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Table scan — drives the gate via output file parsing.
      # exit-code 0 avoids the SARIF all-severities false positive.
      - name: Scan image with Trivy (table)
        id: trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.publish.outputs.digest }}
          format: table
          output: trivy-results.txt
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln

      # Parse table output — "Total:" only appears when findings exist.
      - name: Check for vulnerabilities
        id: check
        run: |
          if grep -q "Total:" trivy-results.txt 2>/dev/null; then
            echo "result=fail" >> "$GITHUB_OUTPUT"
          else
            echo "result=pass" >> "$GITHUB_OUTPUT"
          fi

      # SARIF for Security tab — exit-code 0, does not affect gate.
      - name: Generate SARIF for Security tab
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.publish.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: dev-container-scan

      - name: Write job summary
        if: always()
        run: |
          echo "## Dev deploy — Trivy scan summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.check.outputs.result }}" = "pass" ]; then
            echo "🎉 Trivy exited successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Trivy found vulnerabilities" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** dev" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ needs.publish.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags pushed:**" >> $GITHUB_STEP_SUMMARY
          echo '${{ needs.publish.outputs.tags }}' | tr ',' '\n' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan settings:** CRITICAL,HIGH · ignore-unfixed · os,library only" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Raw Trivy output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          if [ -s trivy-results.txt ]; then
            cat trivy-results.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "No known vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          fi

          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      # Fail after summary is written so output is always visible.
      - name: Fail if vulnerabilities found
        if: steps.check.outputs.result == 'fail'
        run: |
          echo "Fixable CRITICAL or HIGH vulnerabilities were found. See summary above."
          exit 1
