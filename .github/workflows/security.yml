name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1' # Weekly on Monday — catches newly published CVEs

jobs:
  pip-audit:
    name: Audit Python dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Audit Python dependencies
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  container-scan:
    name: Trivy container scan
    runs-on: ubuntu-latest
    # Only scan the built image on pushes to main — PRs just build
    if: github.event_name != 'pull_request'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: soundcork:scan
          # Use GHA cache to avoid rebuilding layers unnecessarily
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Table scan — output visible in the job log and written to a file
      # for the summary step. exit-code 0 so this step never fails on its
      # own; the SARIF step below is the authoritative gate.
      - name: Scan image with Trivy (table)
        id: trivy-table
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: soundcork:scan
          format: table
          output: trivy-results.txt
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln
 
      # SARIF scan — authoritative gate that fails the job if fixable
      # CRITICAL or HIGH CVEs are found. Results uploaded to Security tab.
      - name: Scan image with Trivy (SARIF)
        id: trivy-sarif
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: soundcork:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln
 
      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
 
      # Write a job summary modelled on the pip-audit output format.
      # Reads the table output file produced by the first scan step.
      # Runs whether the SARIF step passed or failed so the summary is
      # always populated regardless of outcome.
      - name: Write job summary
        if: always()
        run: |
          echo "## Trivy container scan summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
 
          if [ "${{ steps.trivy-sarif.outcome }}" = "success" ]; then
            echo "🎉 Trivy exited successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Trivy found vulnerabilities" >> $GITHUB_STEP_SUMMARY
          fi
 
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan settings:** CRITICAL,HIGH · ignore-unfixed · os,library only" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Raw Trivy output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
 
          if [ -s trivy-results.txt ]; then
            cat trivy-results.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "No known vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          fi
 
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
