name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1' # Weekly on Monday — catches newly published CVEs

jobs:
  pip-audit:
    name: Audit Python dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Audit Python dependencies
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  container-scan:
    name: Trivy container scan
    runs-on: ubuntu-latest
    # Only scan the built image on pushes to main — PRs just build
    if: github.event_name != 'pull_request'
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: soundcork:scan
          # Use GHA cache to avoid rebuilding layers unnecessarily
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Single scan producing table output for the summary and log.
      # exit-code 0 — the gate below reads the output file directly,
      # avoiding the SARIF "all severities" behaviour that caused false
      # failures when the scan was otherwise clean.
      - name: Scan image with Trivy
        id: trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: soundcork:scan
          format: table
          output: trivy-results.txt
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln
 
      # Parse the table output to detect actual findings. The table
      # contains a "Total:" line only when vulnerabilities are found.
      # This approach is immune to SARIF formatting side-effects.
      - name: Check for vulnerabilities
        id: check
        run: |
          if grep -q "Total:" trivy-results.txt 2>/dev/null; then
            echo "result=fail" >> "$GITHUB_OUTPUT"
          else
            echo "result=pass" >> "$GITHUB_OUTPUT"
          fi
 
      # Generate SARIF separately for the Security tab — exit-code 0
      # so it never overrides the gate above.
      - name: Generate SARIF for Security tab
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: soundcork:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln
 
      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
 
      - name: Write job summary
        if: always()
        run: |
          echo "## Trivy container scan summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
 
          if [ "${{ steps.check.outputs.result }}" = "pass" ]; then
            echo "🎉 Trivy exited successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Trivy found vulnerabilities" >> $GITHUB_STEP_SUMMARY
          fi
 
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Scan settings:** CRITICAL,HIGH · ignore-unfixed · os,library only" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Raw Trivy output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
 
          if [ -s trivy-results.txt ]; then
            cat trivy-results.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "No known vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          fi
 
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY
 
      # Fail the job after the summary has been written so the output
      # is always visible regardless of pass or fail outcome.
      - name: Fail if vulnerabilities found
        if: steps.check.outputs.result == 'fail'
        run: |
          echo "Fixable CRITICAL or HIGH vulnerabilities were found. See summary above."
          exit 1
