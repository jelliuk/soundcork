name: Build and publish container image

on:
  schedule:
    - cron: '0 2 1 * *'
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
    paths-ignore:
      - README.md
      - CHANGELOG.md
      - LICENSE.md
      - .gitignore
      - .github/**
  pull_request:
    branches: ["main"]
    paths-ignore:
      - README.md
      - CHANGELOG.md
      - LICENSE.md
      - .gitignore
      - .github/**

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # Required for cosign keyless signing

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Compute a date-scoped build version: YYYY-MM-DD-N
      # Uses the run number modulo a daily offset so the counter resets
      # naturally. For true per-day incrementing you can also use an
      # external counter (e.g. a GitHub release or a workflow variable),
      # but run_number is zero-dependency and good enough for most cases.
      - name: Compute date-version tag
        id: datever
        run: |
          DATE=$(date -u +%Y-%m-%d)
          # Use the run number directly as the daily build index.
          # It is monotonically increasing, so two runs on the same day
          # will always produce different values (e.g. -42 then -43).
          # If you need the counter to start at 1 each day, store state
          # in a GitHub environment variable or use a separate counter action.
          BUILD_NUM=${{ github.run_number }}
          echo "tag=${DATE}-${BUILD_NUM}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Date-version tag on every non-PR event
            type=raw,value=${{ steps.datever.outputs.tag }},enable=${{ github.event_name != 'pull_request' }}
            # :latest on pushes to main and scheduled runs
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'schedule' }}
            # Semver tags when a version tag is pushed (e.g. v1.2.3 → :v1.2.3 and :v1.2)
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            # Branch name tag (e.g. :main)
            type=ref,event=branch
            # Short SHA for traceability (e.g. :sha-abc1234)
            type=sha

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          # Push on every event except pull requests
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keyless image signing via Sigstore — only runs when the image was pushed.
      # Signs the immutable digest, not just the mutable tags.
      - name: Sign the published Docker image
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "$TAGS" | tr ',' '\n' | xargs -I {} \
            cosign sign --yes {}@${DIGEST}
